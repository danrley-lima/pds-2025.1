spring:
  application:
    name: product-management
  mvc:
    format:
      enums:
        ignore-case: true
  profiles:
    active:
      - dev

server:
  port: 3000

ai:
  provider:
    preferred: gemini
    gemini:
      api:
        key: ${GEMINI_API_KEY:${google.gemini.api.key:sua_key}}

# Configuração do Framework Multi-Domínio
framework:
  domain:
    default: grocery
    enabled:
      - grocery
      - furniture
      - construction

google:
  gemini:
    api:
      key: ${GEMINI_API_KEY:AIzaSyAb9b6I4J8JUZOo-D3CeHb0tZnT9IL4NnM}

api:
  security:
    token:
      secret: gise-terces
      expiration: 86400000
