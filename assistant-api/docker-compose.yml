services:
  db:
    image: postgres:17.0-alpine3.20
    container_name: postgres-db-pds
    env_file: .env
    environment: 
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes: 
      - ./db_data:/var/lib/postgresql/data
    ports: 
      - "5432:5432"
    # restart: always

volumes:
  db_data: